<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研修資料一覧</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
        }

        body {
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
            background: #f5f7fa;
            color: #263238;
            margin: 0;
            line-height: 1.6;
            -webkit-text-size-adjust: 100%;
        }

        header {
            background: #1976d2;
            color: white;
            padding: 28px 20px;
            text-align: center;
        }

        header h1,
        header p {
            margin: 0;
        }

        header h1 {
            font-size: clamp(1.65rem, 5vw, 2rem);
        }

        header p {
            margin-top: 4px;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        h2 {
            margin: 0;
        }

        .material-section + .material-section {
            margin-top: 28px;
        }

        .section-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            min-height: 52px;
            padding: 10px 4px;
            border: 0;
            background: transparent;
            color: #1565c0;
            font: inherit;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            touch-action: manipulation;
        }

        .section-toggle::after {
            content: "";
            width: 11px;
            height: 11px;
            margin-right: 5px;
            border-right: 3px solid currentColor;
            border-bottom: 3px solid currentColor;
            transform: rotate(45deg) translateY(-3px);
            transition: transform .2s ease;
            flex: 0 0 auto;
        }

        .section-toggle[aria-expanded="false"]::after {
            transform: rotate(-45deg) translateX(-2px);
        }

        .section-toggle:focus-visible,
        .card a:focus-visible {
            outline: 3px solid #ffb300;
            outline-offset: 3px;
            border-radius: 6px;
        }

        .section-content {
            padding-top: 4px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
            margin-bottom: 15px;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        @media (hover: hover) {
            .card:hover {
                box-shadow: 0 5px 14px rgba(0,0,0,.16);
                transform: translateY(-2px);
            }
        }

        .card a {
            display: block;
            padding: 18px 22px;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: bold;
            overflow-wrap: anywhere;
            touch-action: manipulation;
        }

        .card span {
            display: block;
            color: #666;
            font-size: 14px;
            margin-top: 6px;
            font-weight: normal;
        }

        footer {
            text-align: center;
            color: #5f6b76;
            margin: 40px 20px;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            header {
                padding: 22px 16px;
            }

            header p {
                font-size: .9rem;
            }

            main {
                margin: 12px auto 24px;
                padding: 12px;
            }

            .material-section + .material-section {
                margin-top: 18px;
            }

            .section-toggle {
                min-height: 48px;
                padding-inline: 8px;
                font-size: 1.25rem;
            }

            .card {
                margin-bottom: 10px;
                border-radius: 8px;
            }

            .card a {
                min-height: 52px;
                padding: 14px 16px;
                font-size: 16px;
            }

            .card span {
                font-size: 13px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>📚 研修資料</h1>
    <p>ChatGPTで作成した学習資料</p>
</header>

<main>

<section class="material-section">
<h2>

</h2>

<div class="section-content" id="cloud-materials">

<div class="card">

</div>

<div class="card">

        <span>AWS・Azure・GCPの比較</span>
    </a>
</div>

<div class="card">
    <a href="AWS.html">

    </a>
</div>

<div class="card">

<div class="card">
    <a href="google-cloud.html">

</div>
</div>
</section>

<section class="material-section">
<h2>
    <button class="section-toggle" type="button" aria-expanded="true" aria-controls="other-materials">
        その他
    </button>
</h2>

<div class="section-content" id="other-materials">

<div class="card">
    <a href="キャリアプラン整理メモ.html">

</div>

<div class="card">

    </a>
</div>
</div>
</section>

<section class="material-section">
<h2>
    <button class="section-toggle" type="button" aria-expanded="true" aria-controls="exam-materials">
        試験向け
    </button>
</h2>

<div class="section-content" id="exam-materials">

<div class="card">

    </a>
</div>
</div>
</section>

</main>

<footer>
    © My Training Notes
</footer>

<script>
    document.querySelectorAll(".section-toggle").forEach((button) => {
        button.addEventListener("click", () => {
            const content = document.getElementById(button.getAttribute("aria-controls"));
            const isExpanded = button.getAttribute("aria-expanded") === "true";

            button.setAttribute("aria-expanded", String(!isExpanded));
            content.hidden = isExpanded;
        });
    });
</script>

</body>
</html>
